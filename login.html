<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Auto Clipper AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --bg: #0f172a;
            --card: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-image: radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15), transparent),
                radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.1), transparent);
        }

        .login-card {
            background-color: var(--card);
            padding: 48px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 32px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 8px;
            text-align: center;
        }

        p {
            color: #94a3b8;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #4f46e5;
            transform: translateY(-1px);
        }

        #status {
            margin-top: 20px;
            text-align: center;
            font-size: 0.875rem;
            min-height: 20px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo">AUTO CLIPPER</div>
        <h2>Welcome Back</h2>
        <p>Admin Control Panel Access</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="admin">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit">Sign In</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const status = document.getElementById('status');

            btn.disabled = true;
            btn.textContent = 'Authenticating...';
            status.textContent = '';

            try {
                const response = await fetch('api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'login',
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const result = await response.json();

                if (result.success) {
                    status.style.color = '#10b981';
                    status.textContent = 'Login successful! Redirecting...';
                    setTimeout(() => window.location.href = 'index.html', 800);
                } else {
                    status.style.color = '#ef4444';
                    status.textContent = result.message || 'Invalid credentials';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            } catch (err) {
                status.style.color = '#ef4444';
                status.textContent = 'Connection error. Please try again.';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
